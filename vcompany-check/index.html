body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh;color:#1f2937}
.header{background:linear-gradient(135deg,#0e7fc0,#0a5d8f);color:#fff;padding:20px 24px 0}
.header-inner{max-width:1100px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.header-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header-sub{font-size:13px;opacity:.75;margin-top:3px}
.stats{display:none;gap:10px}
.stat{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 16px;text-align:center;min-width:72px}
.stat-n{font-size:24px;font-weight:800}
.stat-n.g{color:#86efac}.stat-n.r{color:#fca5a5}
.stat-l{font-size:11px;opacity:.8}
.filter-bar{background:rgba(255,255,255,.12);border-radius:12px 12px 0 0;padding:16px 18px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.fl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.85;margin-bottom:5px}
.filter-bar input[type=text],.filter-bar input[type=date]{padding:8px 10px;border-radius:8px;border:none;font-size:13px;background:rgba(255,255,255,.92);width:100%}
.sw{position:relative;flex:1;min-width:160px}
.sw input{padding-left:28px}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}
.pw{flex:0 0 160px}
.pw input[type=range]{width:100%;accent-color:#f97316;margin-top:4px}
.btn-check{padding:10px 22px;background:#f97316;border:none;border-radius:8px;color:#fff;font-weight:800;font-size:14px;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(249,115,22,.4)}
.btn-check:hover{background:#ea6c08}
.btn-check:disabled{background:#9ca3af;cursor:not-allowed;box-shadow:none}
.btn-stop{background:#dc2626!important;box-shadow:0 2px 8px rgba(220,38,38,.4)!important}
.prog{display:none;margin-top:10px}
.prog-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;opacity:.9}
.prog-track{background:rgba(255,255,255,.2);border-radius:99px;height:6px}
.prog-fill{background:#f97316;border-radius:99px;height:6px;width:0%;transition:width .3s}
.tabs{background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tabs-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;gap:4px;overflow-x:auto}
.tab{padding:12px 16px;border:none;background:transparent;border-bottom:3px solid transparent;color:#6b7280;font-weight:500;font-size:13px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:inherit;transition:color .15s}
.tab.active{border-bottom-color:#0e7fc0;color:#0e7fc0;font-weight:700}
.tab-c{background:#f3f4f6;color:#9ca3af;border-radius:99px;padding:1px 7px;font-size:11px;font-weight:700}
.tab.active .tab-c{background:#e0f2fe;color:#0e7fc0}
.main{max-width:1100px;margin:0 auto;padding:20px 24px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.tb-info{font-size:14px;color:#6b7280}
.tb-right{display:flex;gap:8px;align-items:center}
.sort-sel{padding:7px 10px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;background:#fff;font-family:inherit;color:#374151}
.vt{display:flex;border:1.5px solid #e5e7eb;border-radius:7px;overflow:hidden}
.vb{padding:6px 11px;border:none;background:#fff;color:#666;cursor:pointer;font-size:15px}
.vb.active{background:#0e7fc0;color:#fff}
.notice{background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:9px 14px;font-size:12px;color:#92400e;margin-bottom:16px;display:none;gap:8px;align-items:center}
.notice.show{display:flex}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px}
.card{background:#fff;border-radius:12px;overflow:hidden;border:1.5px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.card.av{border:2px solid #86efac}
.card.na{border:2px solid #fca5a5;opacity:.72}
.cimg-w{position:relative;flex-shrink:0}
.cimg{width:100%;height:145px;object-fit:cover;display:block;background:#e0f2fe}
.cfb{height:145px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#e0f2fe,#bae6fd)}
.cbadge{position:absolute;top:8px;left:8px;color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:99px;display:flex;align-items:center;gap:4px}

.cdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.7)}
.cov{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(to top,rgba(0,0,0,.3),transparent)}

.cfoot{display:flex;align-items:center;justify-content:space-between}
.cprice{font-size:15px;font-weight:800;color:#0e7fc0}
.cprice span{font-size:10px;font-weight:400;color:#9ca3af}
.cbtn{background:#f97316;color:#fff;padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;text-decoration:none}
.cbtn:hover{background:#ea6c08}
.list{display:flex;flex-direction:column;gap:8px}
.lrow{background:#fff;border-radius:10px;overflow:hidden;border:1.5px solid #e5e7eb;display:flex;align-items:center;transition:box-shadow .15s}
.lrow:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.lrow.av{border:2px solid #86efac}.lrow.na{border:2px solid #fca5a5;opacity:.72}

.lfb{width:80px;height:70px;background:#e0f2fe;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.lbody{flex:1;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.lname{font-size:14px;font-weight:600}

.lprice{font-size:16px;font-weight:800;color:#0e7fc0}

.lst{padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700}
.lst.av{background:#dcfce7;color:#166534}.lst.na{background:#fee2e2;color:#991b1b}
.lbtn{background:#f97316;color:#fff;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:700;text-decoration:none}

.logobar{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 24px;display:flex;align-items:center;justify-content:space-between}
.logobar a{font-size:18px;font-weight:800;color:#0e7fc0;text-decoration:none}
.logobar-s{font-size:12px;color:#9ca3af}
.spinning{display:inline-block;animation:spin 1s linear infinite;font-size:14px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:600px){.stats{display:none!important}.grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}}

const CATS=[{k:'alle',l:'🎯 Alles'},{k:'springkussens',l:'🏰 Springkussens'},{k:'stormbanen',l:'🏃 Stormbanen'},{k:'rodeostieren',l:'🤠 Rodeostieren'},{k:'attracties',l:'🎪 Attracties'}];
const icon=c=>c==='springkussens'?'🏰':c==='stormbanen'?'🏃':c==='rodeostieren'?'🤠':'🎪';
const fmtD=iso=>{const[y,m,d]=iso.split('-');return d+'-'+m+'-'+y;};

let cat='alle',view='grid',sort='default',maxP=900,q='',res={},running=false,stop=false,checked=false;

const today=new Date().toISOString().split('T')[0];
document.getElementById('df').value=today;
document.getElementById('df').min=today;
document.getElementById('dt').value=today;
document.getElementById('dt').min=today;

// Build tabs
const tabsEl=document.getElementById('tabsEl');
CATS.forEach(c=>{
  const cnt=c.k==='alle'?P.length:P.filter(x=>x.c===c.k).length;
  const b=document.createElement('button');
  b.className='tab'+(c.k==='alle'?' active':'');
  b.dataset.k=c.k;
  b.innerHTML=c.l+' <span class="tab-c">'+cnt+'</span>';
  b.onclick=()=>{cat=c.k;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));b.classList.add('active');render();};
  tabsEl.appendChild(b);
});

document.getElementById('q').oninput=e=>{q=e.target.value;render();};
document.getElementById('pr').oninput=e=>{maxP=+e.target.value;document.getElementById('pl').textContent=e.target.value;render();};
document.getElementById('sortSel').onchange=e=>{sort=e.target.value;render();};
document.getElementById('btnGrid').onclick=()=>{view='grid';document.getElementById('btnGrid').classList.add('active');document.getElementById('btnList').classList.remove('active');render();};
document.getElementById('btnList').onclick=()=>{view='list';document.getElementById('btnList').classList.add('active');document.getElementById('btnGrid').classList.remove('active');render();};
document.getElementById('df').onchange=()=>{checked=false;res={};render();};
document.getElementById('dt').onchange=()=>{checked=false;res={};render()};
document.getElementById('btnCheck').onclick=runCheck;

function filtered(){
  let l=P.slice();
  if(cat!=='alle')l=l.filter(x=>x.c===cat);
  if(q.trim())l=l.filter(x=>x.n.toLowerCase().includes(q.toLowerCase()));
  l=l.filter(x=>x.p<=maxP);
  if(sort==='default'&&checked)l.sort((a,b)=>(res[b.id]===true?1:0)-(res[a.id]===true?1:0));
  if(sort==='price_asc')l.sort((a,b)=>a.p-b.p);
  if(sort==='price_desc')l.sort((a,b)=>b.p-a.p);
  if(sort==='naam')l.sort((a,b)=>a.n.localeCompare(b.n));
  return l;
}

// ── Proxy check ─────────────────────────────────────
async function checkOne(id,sd,ed){
  const r=await fetch('/.netlify/functions/proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cartId:id,startDate:sd,endDate:ed})
  });
  const j=await r.json();
  return j.available;
}

async function runCheck(){
  if(running){stop=true;return;}
  const sd=fmtD(document.getElementById('df').value);
  const ed=fmtD(document.getElementById('dt').value);
  const list=filtered();
  running=true;stop=false;checked=false;res={};
  const btn=document.getElementById('btnCheck');
  btn.textContent='⏹ Stop';btn.classList.add('btn-stop');
  document.getElementById('prog').style.display='block';
  document.getElementById('notice').classList.add('show');

  // Parallel checken in batches van 5 tegelijk
  const BATCH = 5;
  let done = 0;
  for(let i=0;i<list.length;i+=BATCH){
    if(stop)break;
    const batch=list.slice(i,i+BATCH);
    document.getElementById('progLbl').innerHTML='<span class="spinning">↻</span> Checken '+Math.min(i+BATCH,list.length)+'/'+list.length;
    document.getElementById('progCnt').textContent=Math.min(i+BATCH,list.length)+'/'+list.length;
    document.getElementById('progFill').style.width=((i/list.length)*100)+'%';

    // Check alle producten in batch tegelijk
    await Promise.all(batch.map(async x=>{
      // Check cache eerst
      const cacheKey=x.id+'|'+sd+'|'+ed;
      if(cache[cacheKey]!==undefined){res[x.id]=cache[cacheKey];return;}
      try{
        const avail=await checkOne(x.id,sd,ed);
        res[x.id]=avail;
        cache[cacheKey]=avail;
      }catch{res[x.id]=null;}
    }));

    done+=batch.length;
    checked=true;
    updateStats();render();
  }

  document.getElementById('progFill').style.width='100%';
  document.getElementById('progLbl').textContent='Klaar ✓';
  btn.textContent='✓ Opnieuw checken';btn.classList.remove('btn-stop');
  running=false;
}

function updateStats(){
  const av=P.filter(x=>res[x.id]===true).length;
  const na=P.filter(x=>res[x.id]===false).length;
  document.getElementById('sA').textContent=av;
  document.getElementById('sN').textContent=na;
  document.getElementById('sT').textContent=P.length;
  document.getElementById('statsBox').style.display='flex';
}

function render(){
  const l=filtered();
  const av=l.filter(x=>res[x.id]===true).length;
  const na=l.filter(x=>res[x.id]===false).length;
  let info='<strong>'+l.length+'</strong> producten';
  if(checked)info='<span style="color:#166534;font-weight:700">'+av+' beschikbaar</span> &nbsp;·&nbsp; <span style="color:#991b1b;font-weight:700">'+na+' niet beschikbaar</span> &nbsp;·&nbsp; '+l.length+' totaal';
  document.getElementById('tbInfo').innerHTML=info;
  const area=document.getElementById('area');
  if(!l.length){area.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px">🔎</div><div>Geen producten gevonden</div></div>';return;}
  area.innerHTML=view==='grid'?'<div class="grid">'+l.map(gc).join('')+'</div>':'<div class="list">'+l.map(lr).join('')+'</div>';
}

function gc(x){
  const a=res[x.id];
  const cls=a===true?'av':a===false?'na':'';
  const badge=a===true?'<div class="cbadge av"><div class="cdot"></div>Beschikbaar</div>':a===false?'<div class="cbadge na"><div class="cdot"></div>Niet beschikbaar</div>':'';
  const btn=a===true?'<a class="cbtn" href="'+x.url+'">Huur →</a>':'';
  return '<div class="card '+cls+'" onclick="if(\''+x.url+'\')window.location.href=\''+x.url+'\'" style="cursor:pointer"><div class="cimg-w"><img class="cimg" src="'+x.img+'" alt="'+x.n+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="cfb" style="display:none">'+icon(x.c)+'</div>'+badge+'<div class="cov"></div></div><div class="cbody"><div class="cname">'+x.n+'</div><div class="cfoot"><div class="cprice">€'+x.p+'<span>/dag</span></div>'+btn+'</div></div></div>';
}

function lr(x){
  const a=res[x.id];
  const cls=a===true?'av':a===false?'na':'';
  const st=a===true?'<div class="lst av">✅ Beschikbaar</div>':a===false?'<div class="lst na">❌ Bezet</div>':'';
  const btn=a===true?'<a class="lbtn" href="'+x.url+'">Huur mij →</a>':'';
  return '<div class="lrow '+cls+'"><img class="limg" src="'+x.img+'" alt="'+x.n+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="lfb" style="display:none">'+icon(x.c)+'</div><div class="lbody"><div><div class="lname">'+x.n+'</div><div class="lcat">'+x.c+'</div></div><div class="lprice">€'+x.p+'<span>/dag</span></div>'+st+btn+'</div></div>';
}

render();
</script>
